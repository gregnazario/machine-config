# Tmux Configuration
# Base configuration for all operating systems
# Uses TPM (Tmux Plugin Manager) for plugins

# === Prefix Key ===
# Change prefix from Ctrl-b to Ctrl-a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Allow sending Ctrl-a to applications by pressing twice
bind C-a send-prefix

# === Basic Settings ===

# Set window and pane index to 1 (0 is too far from keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Set terminal type for proper colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer size
set -g history-limit 50000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status bar more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# === Key Bindings ===

# Vi-mode for copy mode
setw -g mode-keys vi

# More intuitive keybindings for splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new window/pane in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Shift-arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Shift-alt arrow to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

# Mouse support
set -g mouse on

# === Copy Mode (Vi-style) ===

# Bind 'v' to begin selection (like vi)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Bind 'y' to copy selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# === Status Bar ===

# Position of status bar
set -g status-position bottom

# Status bar colors (set by tmux-powerline)
set -g status-bg colour234
set -g status-fg colour15

# Left side of status bar
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=colour231]#[bg=colour02] PREFIX #[default],} #[bold]#S #[default]"

# Right side of status bar
set -g status-right-length 60
set -g status-right '#{?pane_synchronized,#[fg=colour04]SYNC #[default],}%a %h %d %H:%M '

# Window status
set -g window-status-format "#[fg=colour244,bg=colour234]#I:#W "
set -g window-status-current-format "#[fg=colour234,bg=colour27]#[fg=colour15,bold]#I:#W* "

# Window status alignment
set -g status-justify left

# Panes
set -g pane-border-style "fg=colour244,bg=black"
set -g pane-active-border-style "fg=colour27,bg=black"

# Command prompt colors
set -g message-command-style "fg=colour233,bg=colour233"
set -g message-style "fg=brightwhite,bg=colour233"

# === TPM Plugins ===

# List of plugins
set -g @plugin 'tmux-plugins/tpm'                # Tmux Package Manager
set -g @plugin 'tmux-plugins/tmux-sensible'     # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # Continuous saving of sessions
set -g @plugin 'tmux-plugins/tmux-yank'         # Better copying in tmux
set -g @plugin 'tmux-plugins/tmux-copycat'      # Enhanced search
set -g @plugin 'tmux-plugins/tmux-open'         # Open highlighted files/URLs
set -g @plugin 'tmux-plugins/tmux-pain-control' # Better pane control
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Highlight prefix key
set -g @plugin 'tmux-plugins/tmux-online-status'# Show online status
set -g @plugin 'wfxr/tmux-power'                # Powerline theme

# === tmux-resurrect Settings ===

# Enable resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'

# Restore programs
set -g @resurrect-processes 'nvim vim vi emacs man less more tail top htop btop'

# Save shell history
set -g @resurrect-save-shell-history 'on'

# === tmux-continuum Settings ===

# Enable continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # Save every 15 minutes
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'

# === tmux-yank Settings ===

# Use OSC 52 for copy/paste (works over SSH)
set -g @yank_selection_mouse 'clipboard'  # or 'primary' or 'secondary'
set -g @yank_action 'copy-pipe-no-clear'

# Use tmux-copycat settings
set -g @copycat_search_C-c '(?ip:[a-z0-9\-\._+]+@([a-z0-9\-]+\.)+[a-z]+)'  # Email
set -g @copycat_search_C-f '(?ip:file://[[:alnum:][:punct:]]+)'  # File URI
set -g @copycat_search_C-g '(?ip:https?://[[:alnum:][:punct:]]+)'  # URL
set -g @copycat_search_C-d '(?ip:\d{4}-\d{2}-\d{2})'  # ISO date

# === tmux-power Settings ===

# Powerline theme
set -g @tmux_power_theme 'gold'  # gold, red, green, blue, gray, orange, purple, cyan

# Show icons
set -g @tmux_power_show_icon 'yes'

# Show user and host
set -g @tmux_power_show_user 'yes'
set -g @tmux_power_show_hostname 'yes'

# === Other Useful Settings ===

# Toggle synchronized panes
bind * set -g pane-border-style fg=colour196 \; set -g pane-active-border-style fg=colour196 \; set -g window-status-current-format "#[fg=colour196,bg=colour234]#I:#W* "

# Break pane to new window
bind B break-pane -d -n temp

# Join pane from another window
bind J command-prompt -p "join pane from:" "join-pane -s '%%'"

# Move pane to new window
bind > move-pane -t ':.{end}'

# Move window
bind T move-window -t :

# Swap panes
bind < swap-pane -D

# Open browser/URL
bind u run-shell "tmux open #{pane_current_path}"

# Manually toggle sync
bind S set -g pane-border-status top
bind P set -g pane-border-status bottom

# === Session Management ===

# New session with name
bind N command-prompt -p "Session name:" "new-session -s '%%'"

# Kill session
bind K confirm-before -p "Kill session #S?" "kill-session"

# List sessions
bind s choose-session

# Attach to session
bind a choose-session

# === Window Management ===

# Rename window
bind , command-prompt -p "Window name:" "rename-window '%%'"

# Swap windows
bind < swap-window -t -1
bind > swap-window -t +1

# Move window to session
bind m command-prompt -p "Move window to:" "move-window -t '%%'"

# === Layouts ===

# Rotate layouts
bind Space next-layout

# Set specific layouts
bind | select-layout even-horizontal
bind - select-layout even-vertical
bind _ select-layout main-horizontal
bind = select-layout main-vertical

# === Color Customization ===

# Update status bar every 5 seconds
set -g status-interval 5

# Status bar solarized-dark colors
set -g status-bg colour234
set -g status-fg colour15

# Active window color
set -g window-status-current-bg colour27
set -g window-status-current-fg colour15

# Pane border colors
set -g pane-border-style fg=colour244
set -g pane-active-border-style fg=colour27

# Command message colors
set -g message-command-style fg=colour233,bg=colour233
set -g message-style fg=brightwhite,bg=colour233

# === Terminal Overrides ===

# Undercurl support (for neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[3::%p1%dm'

# True color support
set -as terminal-overrides ",xterm-256color:RGB"

# Cursor shape support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# === TPM Initialization ===

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
