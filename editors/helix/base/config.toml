# Helix Editor Configuration
# Base configuration for all operating systems
# https://helix-editor.com/

# === Theme ===
theme = "dracula_theme"

# === Editor Settings ===

[editor]
# Line numbers
line-number = "relative"

# Show cursor position
gutters = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

# Status line
status-line = [
  "mode",
  "spinner",
  "file-name",
  "file-modification-indicator",
  "read-only-indicator",
  "total-line-numbers",
  "file-encoding",
  "file-type",
]

# Mouse support
mouse = true

# Middle-click paste at cursor position
middle-click-paste = false

# Scroll lines
scroll-lines = 3

# Shell
shell = ["bash", "-c"]

# Auto-save
auto-save = true

# Auto-completion
auto-completion = true

# Auto-format
auto-format = true

# Idle timeout
idle-timeout = 250

# completion-timeout = 250
# preview-completion-insert = true

# File picker
file-picker = {
  # Ignore hidden files
  hidden = false
  # Follow symlinks
  follow-symlinks = true
  # Deduplicate results
  deduplicate-links = true
  # Parents
  parents = true
}

# Soft wrap
soft-wrap = {
  enable = true
  max-wrap = 25
  wrap-indicator = "↪ "
  wrap-at-text-width = false
}

# Text width
text-width = 100

# Color-modes
color-modes = true

# LSP
# [editor.lsp]
# Enable LSP
# display-messages = true
# display-inlay-hints = true
# display-signature-help-docs = true
# snippets = true
# goto-reference-include-declaration = true

# === Indent Guides ===

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

# === Cursor Shape ===

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

# === Whitespace ===

[editor.whitespace]
render = "all"
# or control each character
# space = "all"
# tab = "all"
# newline = "none"

# Characters
[editor.whitespace.characters]
space = "·"
nbsp = "␣"
tab = "→"
newline = "⏎"
# tabpad = "·"

# === Search ===

[editor.search]
smart-case = true
wrap-around = true

# === Status Line ===

[editor.status-line]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

# === LSP Configuration ===

[language-server]

# TypeScript/JavaScript
typescript-language-server = {
  command = "typescript-language-server"
  args = ["--stdio"]
  config = { "format.enable" = false }
}

# Python
pyright = {
  command = "pyright-langserver"
  args = ["--stdio"]
  config = {}
}

# Rust
rust-analyzer = {
  command = "rust-analyzer"
}

# Go
gopls = {
  command = "gopls"
}

# YAML
yaml-language-server = {
  command = "yaml-language-server"
  args = ["--stdio"]
}

# JSON
json-language-server = {
  command = "json-language-server"
  args = ["--stdio"]
}

# HTML
vscode-html-language-server = {
  command = "vscode-html-language-server"
  args = ["--stdio"]
}

# CSS
vscode-css-language-server = {
  command = "vscode-css-language-server"
  args = ["--stdio"]
}

# Bash
bash-language-server = {
  command = "bash-language-server"
  args = ["--stdio"]
}

# Markdown
marksman = {
  command = "marksman"
  args = ["serve"]
}

# Terraform
terraform-ls = {
  command = "terraform-ls"
  args = ["serve"]
}

# Docker
docker-langserver = {
  command = "docker-langserver"
  args = ["--stdio"]
}

# Docker Compose
docker-compose-language-server = {
  command = "docker-compose-language-server"
  args = ["--stdio"]
}

# === Language Configuration ===

[[language]]
name = "rust"
language-servers = ["rust-analyzer"]
auto-format = true
rulers = [100]

[language.config.rust-analyzer]
cargo.features = "all"

[[language]]
name = "typescript"
language-servers = ["typescript-language-server"]
auto-format = true
rulers = [100]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "tsx"
language-servers = ["typescript-language-server"]
auto-format = true
rulers = [100]
indent = { tab-width = 2, unit = "  " }

[[language]]
