# === Keybindings ===

[keys.normal]

# Modal keybindings
# Note: The default keybindings are very Vim-like
# You can customize them here

# Window navigation
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-l = "jump_view_right"

# Split window
C-w = ":vsplit"
C-v = ":split"

# Save
C-s = ":write"

# Quit
C-q = ":quit"

# Mode
i = ["insert_mode", "collapse_selection"]
a = ["append_mode", "collapse_selection"]
esc = ["collapse_selection", "keep_primary_selection"]

# Yank
y = ["yank_main_selection_to_clipboard", "yank"]

# Paste
p = "paste_clipboard_after"
P = "paste_clipboard_before"

# Undo
u = ["undo", "collapse_selection"]

# Redo
C-r = ["redo", "collapse_selection"]

# Search
/ = "search"
n = "search_next"
N = "search_prev"

# File picker
C-p = "file_picker"

# Buffer picker
C-b = "buffer_picker"

# Global search
C-f = "global_search"

# LSP
space = { l = {
  c = "lsp_code_action",
  d = "lsp_definition",
  h = "lsp_hover",
  r = "lsp_references",
  s = "lsp_symbol_info",
  w = "lsp_workspace_symbol",
  R = "lsp_rename",
}}

# Quickfix
[leader]
q = ":quit"
w = ":write"
x = ":write!"
Q = ":quit!"

[keys.insert]
# Escape with jj
j = { k = "normal_mode" }
C-s = ":write"
C-z = "undo"
esc = ["collapse_selection", "normal_mode"]

[keys.select]
# Movement
h = "extend_char_left"
j = "extend_line_down"
k = "extend_line_up"
l = "extend_char_right"

# Word movement
w = "extend_next_word_start"
W = "extend_next_long_word_start"
e = "extend_next_word_end"
b = "extend_prev_word_start"
B = "extend_prev_long_word_start"

# Line movement
0 = "extend_line_start"
$ = "extend_line_end"
^ = "extend_line_first_nonwhitespace"

# File operations
C-s = ":write"
C-q = ":quit"

# Mode
esc = ["collapse_selection", "keep_primary_selection", "normal_mode"]

# === OS-specific keybindings will be layered on top ===
# source: editors/helix/os/$(detect-os)/config.toml
