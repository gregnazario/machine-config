# Starship Prompt Configuration
# Base configuration for all operating systems
# https://starship.rs/config/

# === Format ===
# Define the order and format of prompt modules
format = """
[┌](white bold)$username$hostname$directory$git_branch$git_commit$git_state$git_status$git_metrics$fill$nodejs$python$rust$golang$java$cmd_duration
[└](white bold)$character"""

# Right prompt - shows time, jobs, etc.
# right_format = "$time$status$jobs"

# Continuation prompt for multi-line commands
continuation_prompt = '[∙](dimmed white) '

# === Timeout ===
# Commands longer than this (in ms) will show command duration
command_timeout = 2000

# === Palette ===
# Use custom colors or predefined theme
palette = "dracula"

# === Palettes ===
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

# === Modules ===

# Username - show when not default or in SSH
[username]
show_always = false
style_user = "bold purple"
style_root = "bold red"
format = " [$user]($style)@"
disabled = false

# Hostname - show in SSH or when different
[hostname]
ssh_only = false
style = "bold green"
format = "[$hostname]($style) "
disabled = false

# Directory - current working directory
[directory]
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"
read_only_style = "bold red"
truncation_length = 3
truncation_symbol = "…/"
fish_style_pwd_dir_length = 1  # Number of characters to use in fish-style pwd

# Git Branch
[git_branch]
style = "bold purple"
format = " [$symbol$branch]($style) "
symbol = "🌿 "
truncation_length = 20
truncation_symbol = "…"
only_attached = true

# Git Status
[git_status]
style = "bold red"
format = "([$all_status]($style)) "
stashed = "≡ "
modified = "● "
staged = "+"
renamed = "»"
deleted = "✘ "
untracked = "? "
disabled = false

# Git Metrics - show +/-
[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) [-$deleted]($deleted_style) ) "
disabled = false

# Node.js - show when package.json present
[nodejs]
style = "bold green"
format = " [$symbol($version)]($style) "
symbol = "⬢ "
not_capable_style = "bold red"
detect_extensions = ["js", "mjs", "cjs", "ts"]
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

# Python - show when requirements.txt, etc present
[python]
style = "bold yellow"
format = " [$symbol${pyenv_prefix}(${version})(\\($virtualenv\\))]($style) "
symbol = "🐍 "
pyenv_version_name = true
pyenv_prefix = ""
detect_extensions = ["py"]
detect_files = ["requirements.txt", ".python-version", "pyproject.toml", "Poetry.lock"]
detect_folders = [".venv", "venv"]

# Rust - show when Cargo.toml present
[rust]
style = "bold orange"
format = " [$symbol($version)]($style) "
symbol = "🦀 "
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]
detect_folders = []

# Go - show when go.mod present
[golang]
style = "bold cyan"
format = " [$symbol($version)]($style) "
symbol = "🐹 "
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]
detect_folders = []

# Java - show when pom.xml or build.gradle present
[java]
style = "bold red"
format = " [$symbol($version)]($style) "
symbol = "☕ "
detect_extensions = ["java", "class", "jar", "gradle", "clj", "cljc"]
detect_files = ["pom.xml", "build.gradle", "build.sbt"]
detect_folders = []

# Command Duration - show for long-running commands
[cmd_duration]
style = "bold yellow"
format = " [$duration]($style) "
min_time = 2000  # Show for commands taking > 2 seconds
show_milliseconds = false

# Character - the prompt symbol
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold purple)"
vicmd_symbol = "[❮](bold purple)"

# Fill - fill space between left and right prompts
[fill]
symbol = " "
style = "bold white"

# Time - show current time (optional)
# [time]
# disabled = false
# format = " [$time]($style) "
# style = "bold white"
# time_format = "%T"

# Status - exit status of last command
[status]
style = "bold red"
format = " [$status]($style) "
disabled = false
pipestatus = true
pipestatus_format = " [$pipestatus]($style) "

# Jobs - number of background jobs
[jobs]
style = "bold white"
format = " [$symbol$number]($style) "
symbol = "✦ "
number_threshold = 1
symbol_threshold = 1

# === Language-Specific Version Managers ===

# NVM (Node Version Manager)
[nvm]
style = "bold green"
format = " [$symbol$version]($style) "
symbol = "⬢ "
disabled = false

# Pyenv (Python Version Manager)
[pyenv]
style = "bold yellow"
format = " [$symbol$version]($style) "
symbol = "🐍 "
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile"]
detect_folders = [".venv", "venv"]

# === Other Useful Modules ===

# Battery - show battery status (laptops)
[battery]
style = "bold yellow"
format = " [$symbol$percentage]($style) "
full_symbol = "🔋 "
charging_symbol = "⚡️ "
discharging_symbol = "💀 "
unknown_symbol = "❓ "
empty_symbol = "🪦 "

# Show battery only when discharging or below threshold
[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 101
style = "bold green"

# Docker Context
[docker_context]
style = "bold blue"
format = " [$symbol$context]($style) "
symbol = "🐳 "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []

# Kubernetes Context
[kubernetes]
style = "bold blue"
format = " [$symbol$context( \\($namespace\\))]($style) "
symbol = "☸ "
disabled = false
detect_files = ["k8s", "kubeconfig"]
detect_folders = []
detect_extensions = ["yaml", "yml"]
contexts = [
    { context_pattern = ".*prod.*", style = "bold red", symbol = "☸ " },
    { context_pattern = ".*staging.*", style = "bold yellow", symbol = "☸ " },
    { context_pattern = ".*dev.*", style = "bold green", symbol = "☸ " },
]

# Package version - show version of package in current dir
[package]
style = "bold white"
format = " [$symbol$version]($style) "
symbol = "📦 "
disabled = false
display_private = false

# Memory usage
[memory_usage]
style = "bold white"
format = " [$symbol$ram( | $swap)]($style) "
symbol = "🐏 "
threshold = 80
disabled = true

# AWS region
[aws]
style = "bold yellow"
format = " [$symbol$profile( \\($region\\))]($style) "
symbol = "☁️  "
disabled = false

# === Module-Specific Settings ===

# Deno (JavaScript/TypeScript runtime)
[deno]
style = "bold cyan"
format = " [$symbol($version)]($style) "
symbol = "🦕 "
detect_extensions = ["ts", "tsx", "js", "jsx"]
detect_files = ["deno.json", "deno.jsonc", "mod.ts"]
detect_folders = []

# Elm (Functional web language)
[elm]
style = "bold cyan"
format = " [$symbol($version)]($style) "
symbol = "🌳 "
detect_extensions = ["elm"]
detect_files = ["elm.json", "elm-package.json"]
detect_folders = []

# Ruby (if you use it)
[ruby]
style = "bold red"
format = " [$symbol($version)]($style) "
symbol = "💎 "
detect_extensions = ["rb"]
detect_files = ["Gemfile", ".ruby-version"]
detect_folders = []

# Swift (Apple's language)
[swift]
style = "bold orange"
format = " [$symbol($version)]($style) "
symbol = "🍎 "
detect_extensions = ["swift"]
detect_files = ["Package.swift"]
detect_folders = []

# Terraform (Infrastructure as Code)
[terraform]
style = "bold purple"
format = " [$symbol$version]($style) "
symbol = "🏗️  "
detect_extensions = ["tf", "hcl"]
detect_files = ["terraform.tfstate", "terraform.tfvars", ".terraform.lock.hcl"]
detect_folders = [".terraform"]

# Vagrant (VM management)
[vagrant]
style = "bold blue"
format = " [$symbol($version)]($style) "
symbol = "⬛ "
detect_files = ["Vagrantfile"]
detect_folders = []
