# Ripgrep Configuration
# Base configuration for all operating systems
# https://github.com/BurntSushi/ripgrep

# === Case Sensitivity ===
# Case insensitive by default (smart case: sensitive if uppercase present)
--smart-case

# === Hidden Files ===
# Include hidden files in search
--hidden

# === Search Patterns ===

# Follow symbolic links
--follow

# Search in compressed files (gzip, bzip2, lzma, xz, brotli)
--search-zip

# Color output (auto, never, always)
--color=auto

# Colors for matches (syntax: bold dim italic underline blink reverse hidden)
# Match color
--colors 'match:fg:green'
--colors 'match:style:bold'

# Match line color
--colors 'match:bg:yellow'

# Path color
--colors 'path:fg:magenta'
--colors 'path:style:bold'

# Line number color
--colors 'line:fg:cyan'

# Column number color
--colors 'column:fg:blue'

# === File Type Ignoring ===

# Never search in these files
--type-not
lock

--type-not
sqlite

--type-not
sqlite3

# === Directory Ignoring ===

# Don't search in common ignore directories
--glob='!.git/*'
--glob='!.hg/*'
--glob='!.svn/*'

# Node.js
--glob='!node_modules/*'
--glob='!bower_components/*'
--glob='!.yarn/*'
--glob='!.pnp.*'

# Python
--glob='!__pycache__/*'
--glob='!*.pyc'
--glob='!.pytest_cache/*'
--glob='!.mypy_cache/*'
--glob='!.tox/*'
--glob='!venv/*'
--glob='!.venv/*'
--glob='!ENV/*'
--glob='!env/*'

# Rust
--glob='!target/*'
--glob='!Cargo.lock'

# Go
--glob='!vendor/*'

# IDE/Editor
--glob='!.vscode/*'
--glob='!.idea/*'
--glob='!.DS_Store'
--glob='!*.swp'
--glob='!*.swo'
--glob='!*~'

# Build artifacts
--glob='!build/*'
--glob='!dist/*'
--glob='!out/*'

# Logs
--glob='!*.log'

# Temporary files
--glob='!*.tmp'
--glob='!*.temp'

# Documentation (optional, uncomment if you don't want to search docs)
# --glob='!*.md'
# --glob='!*.rst'
# --glob='!*.txt'

# === Max Columns (for very long lines) ===
# Don't print lines longer than this (0 = no limit)
--max-columns=150

# Don't print lines that exceed max columns
--max-columns-preview

# === Context ===
# Show 2 lines of context around matches
--context=2

# === File Encoding ===
# Assume UTF-8 encoding (auto, utf-8, etc.)
--encoding=utf-8

# === Search Mode ===
# Use regex by default (or use --fixed-strings for literal)
# --fixed-strings

# === Performance ===
# Multithreaded search (default: number of CPU cores)
# --threads=8

# === Output Formatting ===

# Show line numbers (default: true)
--line-number

# Show column numbers (default: false)
--column

# Show only filenames (instead of matching lines)
# Uncomment to only see which files contain matches
# --files-with-matches

# Show only matching parts (instead of full lines)
# --only-matching

# Trim whitespace from results
# --trim

# === Replacement (rg --replace) ===
# Replace matches with this string
# --replace=''

# === Sorting ===
# Sort results by file path (default: unsorted)
# --sort=path

# Or sort by modified time
# --sort=modified

# === Miscellaneous ===

# Ignore .gitignore, .rgignore, etc.
# Uncomment to search in ignored files
# --no-ignore

# Ignore .gitignore only (but still use .rgignore)
# --no-ignore-vcs

# Show file type (file, dir, symlink, etc.)
# --file-type

# Human-readable file sizes
# --human-readable

# Hyperlink file names (supported terminals only)
# --hyperlink-format

# Quiet mode (don't print anything, just exit code)
# --quiet

# Unrestricted search (include all files, ignore all ignores)
# --unrestricted

# === Statistics ===
# Print statistics about the search (files searched, matches found, time taken)
# --stats

# === Per-project overrides ===
# You can create .rgignore or .ignore files in specific project directories
# to add project-specific ignores

# === Environment Variables ===
# These can also be set as environment variables:
# RIPGREP_CONFIG_PATH=~/.config/ripgrep/rg.conf
# RIPGREP_COLORS='match:fg:green,match:style:bold,path:fg:magenta,path:style:bold,line:fg:cyan,column:fg:blue'
# RIPGREP_IGNORE_CASE=1
