# btop++ Configuration
# Base configuration for all operating systems
# https://github.com/aristocratos/btop

# === Config Options ===
# Name: btop
# Description: Base btop config with Dracula theme

# === Update Times (in milliseconds) ===
# Recommended values:
# - 500: Very fast (more CPU usage)
# - 1000: Normal (recommended)
# - 2000: Slower (less CPU usage)
update_ms = 1000

# === Process Sorting ===
# Options: pid, program, threads, user, memory, cpu, cpu lazy
# Default: cpu
proc_sorting = cpu lazy

# Reverse sorting order
# Set to true to sort descending (highest value first)
proc_reversed = false

# Process tree sorting
# Options: pid, program, threads, user, memory, cpu
proc_tree = cpu lazy

# === Tree View ===
# Show all branches in tree view
proc_tree_base = 0

# === Color Theme ===
# Valid options: Default,TTY, Nord, Dracula, Catppuccin, etc.
color_theme = /home/greg/.config/btop/themes/Dracula.theme

# === Interface Appearance ===

# Draw a box around boxes (true, false)
draw_box = true

# Draw borders (true, false)
draw_border = true

# Draw borders on separate lines (true, false)
draw_border_own = true

# Solid box borders instead of dashed (true, false)
solid_borders = true

# Background text is black (true, false)
black_text = false

# Graph background color follows graph (true, false)
graph_bg_fill = true

# Show graphs as separate gradients (true, false)
graph_separate = true

# Add box around meter graphs
box_draw = true

# === Shown Boxes ===

# Which boxes to show
# Options: cpu, mem, net, proc, and their positions (0-3)
# Format: <name> <row> <col>
shown_boxes = cpu mem net proc

# Update CPU when btop is in background
update_every = 1

# === CPU Box ===

# Custom CPU name
cpu_sensor = Auto

# Show CPU temperature below CPU graph
show_cpu_freq = true

# Temperature in Celsius or Fahrenheit
# Options: C, F
temp_scale = C

# Show CPU core battery
show_core_temp = true

# Total CPU graph
cpu_graph_upper = true
cpu_graph_lower = true

# CPU graph type
# Options: 0 = off, 1 = block, 2 = graph, 3 = block + graph
cpu_invert = true

# Check CPU temperature (true, false)
check_temp = true

# CPU sensor
cpu_sensor = Auto

# Show CPU core number
show_core_num = true

# === Memory Box ===

# RAM box
mem_graphs = true

# Show memory graph below
mem_below_net = false

# Show swap as a separate meter
show_swap = true
show_swap_disk = true

# Swap disk path
swap_disk = /dev/sda

# === Network Box ===

# Network interface (Auto or specific name)
net_iface = []

# Network sync auto (true, false)
net_sync = true

# Show network graph below
net_auto = true

# Network download/upload speed unit (K, M, G)
net_download = M
net_upload = M

# Network graph type
# Options: 0 = off, 1 = block, 2 = graph, 3 = block + graph
net_graphs = true

# Show network interface name
net_iface = Auto

# === Process Box ===

# Which fields to show
# Options: pid, user, program, arguments, threads, cpu, mem, parent, state
proc_fields = pid user program arguments threads cpu mem

# Process tree
proc_tree = true

# Process sorting
proc_sorting = cpu lazy
proc_reversed = false

# Proc tree sorting
proc_tree_base = 0
proc_color_type = 0

# Process filter (regex)
proc_filter =

# Process tracking (true, false)
proc_click_left =
proc_click_mid =
proc_click_right =
proc_filter_method =

# === Miscellaneous ===

# Enable logging to file
log_level = DEBUG

# Log file location (relative or absolute path)
log_file = ~/.local/share/btop/btop.log

# Vim keys enabled
vim_keys = false

# Background update mode (true, false)
background_update = true

# Truecolor support (true, false)
truecolor = true

# Low battery warning (true, false)
low_battery = 10

# Fahrenheit vs Celsius
# Set to true for Fahrenheit
fahrenheit = false

# Filter regular expressions in process list
proc_filter_core =

# Background update timer
background_update_timer = 10

# === Presets ===

# Tty mode
tty_mode = false

# Force tty mode
force_tty = false

# Hides the graph scale
hide_symbols = false

# === Dracula Theme Configuration ===

# Main colors, classes can be used to create a custom theme
# Format: *<color>=<hex code>
# Example: *main_bg=#1e1e2e

# Background and foreground
*main_bg=#1e1e2e
*main_fg=#f8f8f2

# Title colors
*title_bg=#282a36
*title_fg=#bd93f9

# Highlighted elements
*hi_fg=#bd93f9
*selected_bg=#44475a
*selected_fg=#f8f8f2

# Text colors
*txt_bg=#282a36
*txt_fg=#f8f8f2
*txt_help_bg=#282a36
*txt_help_fg=#f8f8f2

# Box colors
*box_bg=#282a36
*box_title_bg=#44475a

# CPU colors (for each core)
*cpu_fg=#8be9fd
*cpu_bg=#282a36

# Battery colors
*batt_fg=#50fa7b
*batt_bg=#282a36

# Memory colors
*mem_fg=#ff79c6
*mem_bg=#282a36

# Swap colors
*swap_fg=#ff5555
*swap_bg=#282a36

# Network colors (download/upload)
*net_fg=#bd93f9
*net_bg=#282a36
*net_c_fg=#50fa7b
*net_c_bg=#282a36

# Process colors
*proc_fg=#f8f8f2
*proc_bg=#282a36

# Progress bar colors
*progress_fg=#8be9fd
*progress_bg=#44475a

# Graph colors
*graph_fg=#8be9fd
*graph_bg=#44475a

# Meter colors
*meter_fg=#8be9fd
*meter_bg=#44475a

# Misc colors
*disabled_fg=#6272a4
*divider_fg=#44475a
*temp_fg=#ff79c6
*temp_bg=#282a36
*temp_crit_fg=#ff5555
*temp_crit_bg=#ff5555

# === Custom Meters ===

# CPU meter (left, right)
cpu_left = cpu
cpu_right = cpu

# Memory meter (left, right)
mem_left = mem
mem_right = mem

# Network meter (left, right)
net_left = net
net_right = net
net_iface = br0
net_download = M
net_upload = M

# === Process Filter ===

# Process filter to exclude certain processes
# Example: proc_filter = (systemd|init|sshd)

# === Key Bindings ===

# Kill process: k
# Terminate process: t
# Process info: i
# Show all threads: F5
# Show tree: F5
# Filter processes: /
# Invert filter: !
# Search process name: n
# Sort by: + -
# Next sort: >
# Previous sort: <
# Toggle tree view: F5
# Show process path: p
# Show user: u
# Show command line: c
# Toggle options: F2
# Quit: q, Esc, Ctrl-C

# === Tips ===

# - Use btop in a terminal with truecolor support for best results
# - Use vim_keys = true to enable Vim-style navigation (optional)
# - Use low_battery to set a threshold for battery warnings
# - Adjust update_ms for faster/slower updates (affects CPU usage)
# - Use F2 to enter options and customize your theme
# - Press F5 to toggle tree view
# - Press / to filter processes
# - Press k to kill a process
# - Press Ctrl-R to reset all counters
