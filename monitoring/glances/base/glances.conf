# glances Configuration
# Base configuration for all operating systems
# https://nicolargo.github.io/glances/

[global]
# --- Global settings ---

# Start Glances in web server mode
# webserver = False
# bind = 0.0.0.0
# port = 61208

# Reactive mode (set to True to disable)
# check = True

# Update interval (in seconds)
refresh = 2

# History timeout
time = 60

# Watch process changes
watch = True

# Process filter
process_filter = =

# Enable/Disable network I/O
enable_history = True
enable_process_extended = True

# Temperature
check_temperature = False
# celsius = True
# fahrenheit = False
# unit = 'celsius' or 'fahrenheit'

# Network
disable_network = False

# Disk I/O
disable_diskio = False

# Sensors
disable_sensors = False

# Container
disable_container = False

# Battery
disable_battery = False
disable_gpu = False

# --- Display settings ---

# Graph style
# char_graph = '|'
# graph_dot = '·'
# graph_braille = '⡯⡾⡷⡾⡯'
# graph_block = '⣿⣶⣴⣷⣾'

# No data
# no_data = ' '

# --- Colors ---

# Color theme (whitetongaion, white with grafana, purple, blue, green, yellow, cyan, pink, orange, dracula)
theme = dracula

# Enable color output
# enable Curry = True

# CPU

[cpu]
# CPU fields
cpu_alert = 50
# cpu_log = True
# cpu_log = True
# percpu = False
# cpu_name = False
# cpu_wani = False

# MEM

[mem]
# MEM fields
# mem = True
# mem = True
# swap = True
# mem_log = False
# mem_label = 'MEM'

# LOAD

[load]
# LOAD fields
# load = True
# load_order = '1 5 15m'
# load_alert_5m = 50
# load_alert_15m = 50

# --- Quick Look ---

[quicklook]
# Quicklook options
# cpu = True
# mem = True
# mem = True
# load = True

# --- Sensors ---

[sensors]
# Sensors options
# battery = True
# gpu = False

# --- Filesystem ---

[fs]
# Filesystem options
# free = False
# fs_free = 50

# --- Network ---

[network]
# Network options
# interfaces = ['eth0', 'wlan0']  # default interfaces
# hide_interface = ['lo']

# Network summary
# network_sum = True

# Network bytes per second
# network_bits = False
# network_cumul = False

# Network interface alias
# interface_alias = { 'eth0': 'Wired', 'wlan0': 'Wireless' }

# --- Ports ---

[ports]
# Ports scanner
# ports = False
# ports_refresh = 60
# ports_exporter_enable = False
# ports_host = '127.0.0.1'
# ports_only = None

# --- Amps ---

[amps]
# Amps options
# amps = False

# --- Web Server ---

[webserver]
# Web server options
# webserver = False
# webserver_bind = '0.0.0.0'
# webserver_port = 61208
# webserver_open_browser = False

# --- Dracula Theme ---

[dracula]
# Dracula theme colors

